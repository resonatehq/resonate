# Unified CD Pipeline for Resonate Server (Rust)
#
# Triggered by:
#   - GitHub Release published (production)
#   - Manual workflow_dispatch (testing)
#
# Pipeline:
#   1. check-version — Validates Cargo.toml matches release tag
#   2. publish-dockerhub — Multi-platform Docker images → DockerHub
#   3. publish-github-image — Multi-platform Docker images → GHCR
#   4. publish-github-artifacts — Cross-platform binary artifacts
#   5. update-homebrew — Opens PR to update resonatehq/homebrew-tap formula
#   6. verify-artifacts — Post-publication verification
#
# See .github/CD_PIPELINE.md for full documentation.

name: CD

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.0)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  DOCKERHUB_IMAGE: resonatehqio/resonate

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1: VERSION VALIDATION (ACTIVE)
  # ═══════════════════════════════════════════════════════════════════════════

  check-version:
    name: Check Release Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.cargo_version_tagged }}
      version_bare: ${{ steps.version.outputs.cargo_version }}
      tag: ${{ steps.version.outputs.tag_version }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG}" >> $GITHUB_OUTPUT

      - name: Checkout repository at tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          # Extract version from Cargo.toml [package] section
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          # Ensure tag starts with 'v'
          TAG="${{ steps.tag.outputs.value }}"
          if [[ ! "${TAG}" =~ ^v ]]; then
            TAG_VERSION="v${TAG}"
          else
            TAG_VERSION="${TAG}"
          fi

          # Ensure Cargo version has 'v' prefix for comparison
          CARGO_VERSION_TAGGED="v${CARGO_VERSION}"

          echo "cargo_version=${CARGO_VERSION}" >> $GITHUB_OUTPUT
          echo "cargo_version_tagged=${CARGO_VERSION_TAGGED}" >> $GITHUB_OUTPUT
          echo "tag_version=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Verify version match
        run: |
          CARGO_VERSION="${{ steps.version.outputs.cargo_version_tagged }}"
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"

          echo "Cargo.toml version: ${CARGO_VERSION}"
          echo "GitHub release tag: ${TAG_VERSION}"

          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "❌ Version mismatch!"
            echo "  Cargo.toml has: ${CARGO_VERSION}"
            echo "  GitHub tag is:  ${TAG_VERSION}"
            exit 1
          fi

          echo "✓ Version match confirmed: ${TAG_VERSION}"

      - name: Display summary
        run: |
          echo "## Release Version Verification ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cargo.toml:** ${{ steps.version.outputs.cargo_version_tagged }}" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Tag:** ${{ steps.version.outputs.tag_version }}" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2: DOCKER IMAGE PUBLISHING (DISABLED)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Publishing to DockerHub is commented out.
  # To enable:
  #   1. Set secrets: DOCKER_USERNAME, DOCKER_PASSWORD
  #   2. Remove: if: false
  #   3. Test with workflow_dispatch

  publish-dockerhub:
    name: Publish DockerHub Image
    needs: [check-version]

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ needs.check-version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2.5: GITHUB CONTAINER REGISTRY PUBLISHING (DISABLED)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Publishing to GHCR is commented out.
  # To enable:
  #   1. No secrets needed (uses GITHUB_TOKEN)
  #   2. Remove: if: false
  #   3. Test with workflow_dispatch

  publish-github-image:
    name: Publish GitHub Container Image
    needs: [check-version]

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.check-version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 3: BINARY ARTIFACT PUBLISHING (DISABLED)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Publishing binary artifacts is commented out.
  # To enable:
  #   1. No secrets needed (uses GITHUB_TOKEN)
  #   2. Remove: if: false
  #   3. Test with workflow_dispatch
  #
  # Builds for:
  #   - Linux x86_64 (ubuntu-latest)
  #   - Linux aarch64/ARM (ubuntu-latest-arm)
  #   - macOS x86_64 (macos-13)
  #   - macOS aarch64/ARM64 (macos-14)
  #
  # Produces:
  #   - resonate_<os>_<arch>.tar.gz
  #   - resonate_<os>_<arch>.tar.gz.sha256

  publish-github-artifacts:
    name: Publish Binary Artifacts (${{ matrix.systems.os }} ${{ matrix.systems.arch }})
    needs: [check-version]

    runs-on: ${{ matrix.systems.runner }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        systems:
          - os: linux
            arch: x86_64
            arch_verify: x86-64
            runner: ubuntu-24.04

          - os: linux
            arch: aarch64
            arch_verify: aarch64
            runner: ubuntu-24.04-arm

          - os: darwin
            arch: x86_64
            arch_verify: x86_64
            runner: macos-26-intel

          - os: darwin
            arch: aarch64
            arch_verify: arm64
            runner: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Build binary
        run: |
          cargo build --release

          # Verify binary architecture
          file target/release/resonate | grep -i "${{ matrix.systems.arch_verify }}" || \
            (echo "Binary architecture mismatch"; exit 1)

      - name: Create tarball and checksum
        run: |
          TARBALL="resonate_${{ matrix.systems.os }}_${{ matrix.systems.arch }}.tar.gz"
          TARBALL_CHECKSUM="${TARBALL}.sha256"

          # Copy binary
          cp target/release/resonate ./resonate

          # Create tarball
          tar -czf "${TARBALL}" resonate

          # Create checksum
          if [[ "${{ matrix.systems.os }}" == "darwin" ]]; then
            shasum -a 256 "${TARBALL}" > "${TARBALL_CHECKSUM}"
          else
            sha256sum "${TARBALL}" > "${TARBALL_CHECKSUM}"
          fi

          echo "Created ${TARBALL}"
          cat "${TARBALL_CHECKSUM}"

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          TARBALL="resonate_${{ matrix.systems.os }}_${{ matrix.systems.arch }}.tar.gz"
          TARBALL_CHECKSUM="${TARBALL}.sha256"

          gh release upload "${TAG}" "${TARBALL}" --clobber
          gh release upload "${TAG}" "${TARBALL_CHECKSUM}" --clobber

          echo "✓ Uploaded ${TARBALL} and checksum to release ${TAG}"

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 3.5: HOMEBREW FORMULA UPDATE (DISABLED)
  # ═══════════════════════════════════════════════════════════════════════════
  # Updates resonatehq/homebrew-tap with new version and sha256 checksums
  # Opens a pull request for review
  # Requires: HOMEBREW_TAP_TOKEN secret (personal access token with repo scope)

  update-homebrew:
    name: Update Homebrew Formula
    needs: [check-version, publish-github-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          echo "Downloading checksums for release: ${TAG}"

          # Create temp directory
          mkdir -p checksums
          cd checksums

          # Download all sha256 files
          gh release download "${TAG}" -p "*.sha256" -R ${{ github.repository }}

          # Display downloaded files
          ls -la
          echo "Downloaded checksums:"
          cat *.sha256

      - name: Extract sha256 values
        id: checksums
        run: |
          cd checksums

          # Extract sha256 for each platform (first field of each file)
          DARWIN_ARM64=$(grep "resonate_darwin_aarch64.tar.gz" resonate_darwin_aarch64.tar.gz.sha256 | awk '{print $1}')
          DARWIN_X86_64=$(grep "resonate_darwin_x86_64.tar.gz" resonate_darwin_x86_64.tar.gz.sha256 | awk '{print $1}')
          LINUX_ARM64=$(grep "resonate_linux_aarch64.tar.gz" resonate_linux_aarch64.tar.gz.sha256 | awk '{print $1}')
          LINUX_X86_64=$(grep "resonate_linux_x86_64.tar.gz" resonate_linux_x86_64.tar.gz.sha256 | awk '{print $1}')

          # Output to GitHub Actions
          echo "darwin_arm64=${DARWIN_ARM64}" >> $GITHUB_OUTPUT
          echo "darwin_x86_64=${DARWIN_X86_64}" >> $GITHUB_OUTPUT
          echo "linux_arm64=${LINUX_ARM64}" >> $GITHUB_OUTPUT
          echo "linux_x86_64=${LINUX_X86_64}" >> $GITHUB_OUTPUT

          # Display values
          echo "Extracted checksums:"
          echo "  darwin_aarch64: ${DARWIN_ARM64}"
          echo "  darwin_x86_64:  ${DARWIN_X86_64}"
          echo "  linux_aarch64:  ${LINUX_ARM64}"
          echo "  linux_x86_64:   ${LINUX_X86_64}"

      - name: Checkout homebrew-tap repository
        uses: actions/checkout@v5
        with:
          repository: resonatehq/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula with new version and checksums
        env:
          VERSION: ${{ needs.check-version.outputs.version_bare }}
          DARWIN_ARM64_SHA: ${{ steps.checksums.outputs.darwin_arm64 }}
          DARWIN_X86_64_SHA: ${{ steps.checksums.outputs.darwin_x86_64 }}
          LINUX_ARM64_SHA: ${{ steps.checksums.outputs.linux_arm64 }}
          LINUX_X86_64_SHA: ${{ steps.checksums.outputs.linux_x86_64 }}
        run: |
          cd homebrew-tap/Formula

          echo "Updating resonate.rb with version ${VERSION}"

          # Update version (line 2)
          sed -i "s/version '[v0-9.]\+'/version '${VERSION}'/" resonate.rb

          # Update darwin aarch64 sha256 (after darwin_aarch64.tar.gz URL)
          sed -i "/resonate_darwin_aarch64\.tar\.gz/{n;s/sha256 \"[a-f0-9]\+\"/sha256 \"${DARWIN_ARM64_SHA}\"/;}" resonate.rb

          # Update darwin x86_64 sha256 (after darwin_x86_64.tar.gz URL)
          sed -i "/resonate_darwin_x86_64\.tar\.gz/{n;s/sha256 \"[a-f0-9]\+\"/sha256 \"${DARWIN_X86_64_SHA}\"/;}" resonate.rb

          # Update linux aarch64 sha256 (after linux_aarch64.tar.gz URL)
          sed -i "/resonate_linux_aarch64\.tar\.gz/{n;s/sha256 \"[a-f0-9]\+\"/sha256 \"${LINUX_ARM64_SHA}\"/;}" resonate.rb

          # Update linux x86_64 sha256 (after linux_x86_64.tar.gz URL)
          sed -i "/resonate_linux_x86_64\.tar\.gz/{n;s/sha256 \"[a-f0-9]\+\"/sha256 \"${LINUX_X86_64_SHA}\"/;}" resonate.rb

          echo "Updated formula:"
          cat resonate.rb

      - name: Create branch and commit changes
        env:
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          cd homebrew-tap

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create feature branch
          BRANCH="update-resonate-${TAG}"
          git checkout -b "${BRANCH}"

          # Commit changes
          git add Formula/resonate.rb
          git commit -m "chore: update resonate to ${TAG}

          Automated update from resonatehq/resonate release workflow.

          - Version: ${TAG}
          - Release: https://github.com/resonatehq/resonate/releases/tag/${TAG}"

          # Push branch
          git push origin "${BRANCH}"

          echo "✓ Pushed branch ${BRANCH} to homebrew-tap"
          echo "branch=${BRANCH}" >> $GITHUB_ENV

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.check-version.outputs.tag }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd homebrew-tap

          BRANCH="update-resonate-${TAG}"

          # Create PR
          gh pr create \
            --repo resonatehq/homebrew-tap \
            --base main \
            --head "${BRANCH}" \
            --title "chore: update resonate to ${TAG}" \
            --body "## Automated Formula Update

          Updates Resonate formula to version **${VERSION}** from [release ${TAG}](https://github.com/resonatehq/resonate/releases/tag/${TAG}).

          ### Changes
          - Updated version to \`${VERSION}\`
          - Updated sha256 checksums for all platforms (darwin/linux × x86_64/aarch64)

          ### Verification
          - [ ] Checksums match published release artifacts
          - [ ] Version matches Cargo.toml in resonate repository

          ---

          🤖 Generated by [CD workflow](https://github.com/resonatehq/resonate/actions/workflows/cd.yml)"

          echo "✓ Created PR for ${TAG}"

      - name: Display summary
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          echo "## Homebrew Formula Updated ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** resonatehq/homebrew-tap" >> $GITHUB_STEP_SUMMARY
          echo "**Formula:** Formula/resonate.rb" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View: https://github.com/resonatehq/homebrew-tap/blob/main/Formula/resonate.rb" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 4: POST-PUBLICATION VERIFICATION (DISABLED)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Artifact verification is commented out.
  # To enable:
  #   1. No secrets needed (uses GITHUB_TOKEN)
  #   2. Remove: if: false
  #   3. Ensure publish jobs are enabled (depends on them)
  #
  # Validates:
  #   - All expected artifacts exist
  #   - Checksum files are valid
  #   - All platforms represented
  #   - GitHub Release metadata

  verify-artifacts:
    name: Verify Release Artifacts
    needs:
      [
        check-version,
        publish-dockerhub,
        publish-github-image,
        publish-github-artifacts,
      ]

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify GitHub Release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          echo "Verifying artifacts for release: ${TAG}"

          # Expected artifact files
          EXPECTED_ARTIFACTS=(
            "resonate_linux_x86_64.tar.gz"
            "resonate_linux_x86_64.tar.gz.sha256"
            "resonate_linux_aarch64.tar.gz"
            "resonate_linux_aarch64.tar.gz.sha256"
            "resonate_darwin_x86_64.tar.gz"
            "resonate_darwin_x86_64.tar.gz.sha256"
            "resonate_darwin_aarch64.tar.gz"
            "resonate_darwin_aarch64.tar.gz.sha256"
          )

          # Get list of release assets
          RELEASE_ASSETS=$(gh release view "${TAG}" --json assets --jq '[.assets[].name]' -R ${{ github.repository }})

          MISSING_ARTIFACTS=()
          for artifact in "${EXPECTED_ARTIFACTS[@]}"; do
            if ! echo "${RELEASE_ASSETS}" | grep -q "\"${artifact}\""; then
              MISSING_ARTIFACTS+=("${artifact}")
            fi
          done

          if [ ${#MISSING_ARTIFACTS[@]} -gt 0 ]; then
            echo "❌ Missing artifacts:"
            for artifact in "${MISSING_ARTIFACTS[@]}"; do
              echo "  - ${artifact}"
            done
            exit 1
          fi

          echo "✓ All expected artifacts found"

      - name: Verify checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.check-version.outputs.tag }}
        run: |
          echo "Verifying checksums for release: ${TAG}"

          # Create temporary directory
          TEMP_DIR=$(mktemp -d)
          cd "${TEMP_DIR}"

          # Download checksums
          gh release download "${TAG}" -p "*.sha256" -R ${{ github.repository }}

          # Download binaries
          gh release download "${TAG}" -p "*.tar.gz" -R ${{ github.repository }}

          # Verify each checksum
          for checksum_file in *.sha256; do
            if [ -f "${checksum_file}" ]; then
              echo "Verifying ${checksum_file}..."

              if sha256sum -c "${checksum_file}" 2>/dev/null; then
                echo "✓ ${checksum_file} valid"
              else
                echo "❌ ${checksum_file} invalid"
                exit 1
              fi
            fi
          done

          echo "✓ All checksums verified"

      - name: Publish verification summary
        run: |
          echo "## Release Verification ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ needs.check-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:** All present and verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Binary Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Linux x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Linux aarch64" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ macOS x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ macOS aarch64" >> $GITHUB_STEP_SUMMARY
